services:
  backend:
    build: ./backend
    ports:
      - "8002:8002"
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: interview_db
    ports:
      - "5434:5432"
    volumes:
      - interview_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d interview_db"]
      interval: 3s
      retries: 5

volumes:
  interview_pgdata:
