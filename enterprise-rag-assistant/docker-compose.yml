services:
  backend:
    build: ./backend
    ports:
      - "8003:8003"
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/chroma_data:/app/chroma_data

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: rag_db
    ports:
      - "5435:5432"
    volumes:
      - rag_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d rag_db"]
      interval: 3s
      retries: 5

volumes:
  rag_pgdata:
